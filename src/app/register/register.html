<!-- 1. Buttons passing numbers -->
<button (click)="fun(1)">Show Item 1</button>
<button (click)="fun(2)">Show Item 2</button>

<!-- 2. Conditional Divs based on the value of 'x' -->
<div *ngIf="x === 1">
  <h1>Hello World (Item 1 Selected)</h1>
</div>

<div *ngIf="x === 2">
  <h1>Hello Universe (Item 2 Selected)</h1>
</div>

<!-- 3. List of dynamic items -->
<ul>
  <!-- Clicking an item passes that specific item's value to fun() -->
  <li *ngFor="let item of name" (click)="fun(item)">
    <!-- Removed the empty *ngIf so the text actually shows up -->
    <span>{{ item }}</span>
  </li>
</ul>

<!-- 4. Fallback: Show what was clicked if it's not 1 or 2 -->
<div *ngIf="x !== 1 && x !== 2 && x !== undefined">
  <h1>You clicked: {{ x }}</h1>
</div>
