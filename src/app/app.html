<!--
  ROOT TEMPLATE — app.html
  This is the SHELL that wraps the whole application.
  The <header> (navbar) stays on every page.
  Each page component renders inside <router-outlet>.
-->

<header style="background:#1a1a2e; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,0.4);">
  <nav style="display:flex; align-items:center; gap:2px; flex-wrap:wrap;
              max-width:1100px; margin:0 auto; padding:10px 16px;">

    <span style="color:#64ffda; font-weight:bold; font-size:0.95rem; margin-right:10px; white-space:nowrap;">
      Angular Learn
    </span>

    <!--
      @for loops over navLinks array in app.ts
      [routerLink]="link.path"         → property binding for navigation (no page reload)
      routerLinkActive="nav-active"    → adds the 'nav-active' CSS class when route is active
    -->
    @for (link of navLinks; track link.path) {
      <a [routerLink]="link.path"
         routerLinkActive="nav-active"
         style="color:#aaa; text-decoration:none; padding:6px 10px; border-radius:4px;
                font-size:0.82rem; white-space:nowrap; transition:color 0.2s;">
        {{ link.label }}
      </a>
    }

  </nav>
</header>

<!-- Page components are injected here by Angular Router -->
<main style="padding:24px 20px; min-height:calc(100vh - 52px); background:#f5f7fa;">
  <router-outlet />
</main>
