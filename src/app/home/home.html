<!-- HOME PAGE — Dashboard with links to every topic -->
<div style="max-width:900px; margin:0 auto;">

  <h1 style="color:#1a1a2e; font-size:2rem; margin-bottom:4px;">Angular Interview Prep</h1>
  <p style="color:#555; margin-top:0;">Click any card to learn with live examples and code comments.</p>

  <!-- Grid of topic cards — looping with @for (new Angular syntax) -->
  <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(270px,1fr)); gap:16px; margin-top:24px;">

    @for (topic of topics; track topic.route) {
      <!--
        [routerLink]="topic.route" → property binding to navigate on click
        This is CLIENT-SIDE navigation — no page reload
      -->
      <a [routerLink]="topic.route"
         style="display:block; padding:20px; background:white; border:2px solid #e0e4ff;
                border-radius:10px; text-decoration:none; color:inherit;
                box-shadow:0 2px 6px rgba(0,0,0,0.06); transition:border-color 0.2s, box-shadow 0.2s;">
        <h3 style="margin:0 0 8px; color:#1a1a2e; font-size:1rem;">{{ topic.title }}</h3>
        <p style="margin:0; color:#666; font-size:0.85rem;">{{ topic.desc }}</p>
      </a>
    }

  </div>

</div>
